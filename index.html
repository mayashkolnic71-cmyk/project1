<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedbackAI - מערכת הגשות דיגיטלית</title>
  
  <!-- PWA Manifest & Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3730a3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://static.wixstatic.com/media/6bc0af_7019d443c059443b9e25e6cf39f14dea~mv2.jpeg">

  <!-- Open Graph / WhatsApp Preview Tags -->
  <meta property="og:title" content="פורטל הגשת עבודות - הפורום לאחיות ולעוסים">
  <meta property="og:description" content="היכנסו לאפליקציית הפורטל להגשת מטלות הקורס ולצפייה בהנחיות המרצה.">
  <meta property="og:image" content="https://static.wixstatic.com/media/6bc0af_7019d443c059443b9e25e6cf39f14dea~mv2.jpeg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="מערכת הגשות">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
  <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body { font-family: 'Heebo', sans-serif; }
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 7s infinite; }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }
    .dir-ltr { direction: ltr; text-align: left; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .fade-in { animation: fadeIn 0.5s ease-out; }
    .slide-in-from-left-8 { animation: slideInLeft 0.5s ease-out; }
    .slide-in-from-right-8 { animation: slideInRight 0.5s ease-out; }
    .zoom-in-95 { animation: zoomIn 0.7s ease-out; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    /** @jsx React.createElement */
    /** @jsxFrag React.Fragment */
    
    const { useState, useEffect, useRef } = React;

    const COURSES = [
      "ניהול סיכונים ובטיחות המטופל בגריאטריה",
      "מניעת זיהומים",
      "טיפול תומך"
    ];

    // SVG Icons
    const UserIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const CreditCardIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;
    const LinkIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
    const ChevronLeftIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const ChevronRightIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const CheckCircleIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const FileTextIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
    const XIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const BotIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>;
    const UploadCloudIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;
    const AlertCircleIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const BookOpenIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const PrinterIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;

    const feedbackPool = [
      { id: 1, title: 'הבנת החומר התיאורטי', text: 'העבודה מציגה הבנה מצוינת של מושגי היסוד והתיאוריות שנלמדו. ניכרת יכולת לשלב את החומר התיאורטי בצורה מעשית.', icon: <CheckCircleIcon className="w-5 h-5 text-green-500" /> },
      { id: 2, title: 'יישום קליני ומעשי', text: 'ההמלצות הקליניות מבוססות היטב על הספרות המקצועית, אך יש מקום להרחיב לגבי האתגרים ביישום בשטח.', icon: <CheckCircleIcon className="w-5 h-5 text-green-500" /> },
      { id: 3, title: 'כתיבה אקדמית ומקורות', text: 'הכתיבה ברורה ורהוטה. השימוש במקורות מידע עדכניים ורלוונטיים ראוי לשבח.', icon: <CheckCircleIcon className="w-5 h-5 text-green-500" /> },
      { id: 4, title: 'חשיבה ביקורתית', text: 'העבודה מציגה יכולת ניתוח גבוהה וחשיבה ביקורתית מעמיקה כלפי הגישות השונות שהוצגו.', icon: <CheckCircleIcon className="w-5 h-5 text-green-500" /> },
      { id: 5, title: 'מבנה וארגון העבודה', text: 'המבנה הגיוני וזורם, אך חסר סיכום ברור בסוף העבודה שמאגד את כל המסקנות לנקודה אחת.', icon: <AlertCircleIcon className="w-5 h-5 text-amber-500" /> },
      { id: 6, title: 'מקוריות ויצירתיות', text: 'ניכרת נקודת מבט ייחודית ומעניינת על הסוגיה, המעידה על חשיבה עצמאית מחוץ לקופסה.', icon: <CheckCircleIcon className="w-5 h-5 text-green-500" /> },
      { id: 7, title: 'התייחסות לאתיקה רפואית', text: 'העבודה משלבת התייחסות ראויה לסוגיות אתיות מורכבות הקשורות לטיפול בסיעוד.', icon: <CheckCircleIcon className="w-5 h-5 text-green-500" /> },
      { id: 8, title: 'ניתוח מקרה', text: 'תיאור המקרה (Case Study) מפורט, אך היה ניתן להעמיק יותר באבחנה המבדלת.', icon: <AlertCircleIcon className="w-5 h-5 text-amber-500" /> }
    ];

    const DigitalSubmission = () => {
      const [step, setStep] = React.useState(0);
      const [formData, setFormData] = useState({ courseName: '', fullName: '', idNumber: '', urls: ['', '', ''], files: [] });
      const [errors, setErrors] = useState({});
      const [isSubmitting, setIsSubmitting] = useState(false);
      const DEFAULT_COURSE_SETTINGS = {
        "ניהול סיכונים ובטיחות המטופל בגריאטריה": { date: "" },
        "מניעת זיהומים": { date: "" },
        "טיפול תומך": { date: "" }
      };

      const [isAnalyzing, setIsAnalyzing] = React.useState(false);
      const [timestamp, setTimestamp] = React.useState(null);
      const [feedbackData, setFeedbackData] = React.useState([]);
      const [courseSettings, setCourseSettings] = React.useState(DEFAULT_COURSE_SETTINGS);
      const [activeDocHtml, setActiveDocHtml] = React.useState(null);
      const [isLoadingDoc, setIsLoadingDoc] = React.useState(false);
      const fileInputRef = useRef(null);

      const COURSE_DOCS = {
        "ניהול סיכונים ובטיחות המטופל בגריאטריה": "risk_management.docx",
        "מניעת זיהומים": "infection_control.docx",
        "טיפול תומך": "palliative_care.docx"
      };

      useEffect(() => {
        const settings = JSON.parse(localStorage.getItem('feedbackAI_course_settings'));
        if (settings) {
          setCourseSettings(prev => ({ ...prev, ...settings }));
        }
      }, []);

      const triggerConfetti = () => {
        if (window.confetti) {
          const duration = 3000;
          const end = Date.now() + duration;

          const frame = () => {
            window.confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#4f46e5', '#a855f7', '#ec4899'] });
            window.confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#4f46e5', '#a855f7', '#ec4899'] });
            if (Date.now() < end) requestAnimationFrame(frame);
          };
          frame();
        }
      };

      const printReceipt = () => {
        window.print();
      };

      const handleInputChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
        if (errors[field]) setErrors(prev => ({ ...prev, [field]: null }));
      };

      const handleUrlChange = (index, value) => {
        const newUrls = [...formData.urls];
        newUrls[index] = value;
        setFormData(prev => ({ ...prev, urls: newUrls }));
        if (index === 0 && errors.mainUrl) setErrors(prev => ({ ...prev, mainUrl: null }));
      };

      const handleFileChange = (e) => {
        const selectedFiles = Array.from(e.target.files);
        if (formData.files.length + selectedFiles.length > 3) {
          setErrors(prev => ({ ...prev, files: 'ניתן לצרף עד 3 מסמכים בלבד' }));
          return;
        }
        setFormData(prev => ({ ...prev, files: [...prev.files, ...selectedFiles] }));
        setErrors(prev => ({ ...prev, files: null }));
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const removeFile = (indexToRemove) => {
        setFormData(prev => ({ ...prev, files: prev.files.filter((_, idx) => idx !== indexToRemove) }));
        setErrors(prev => ({ ...prev, files: null }));
      };

      const validateStep1 = () => {
        const newErrors = {};
        if (!formData.courseName) newErrors.courseName = 'חובה לבחור קורס';
        if (!formData.fullName.trim()) newErrors.fullName = 'שם מלא הוא שדה חובה';
        if (!formData.idNumber.trim()) {
          newErrors.idNumber = 'תעודת זהות היא שדה חובה';
        } else if (!/^\d{8,9}$/.test(formData.idNumber.trim())) {
          newErrors.idNumber = 'תעודת זהות חייבת להכיל 8-9 ספרות';
        }
        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      };

      const validateStep2 = () => {
        const newErrors = {};
        const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;
        const hasMainUrl = formData.urls[0].trim().length > 0;
        const hasFiles = formData.files.length > 0;
        
        if (!hasMainUrl && !hasFiles) {
          newErrors.mainUrl = 'חובה להזין קישור ראשי או לצרף לפחות מסמך אחד';
        } else if (hasMainUrl && !urlPattern.test(formData.urls[0].trim())) {
          newErrors.mainUrl = 'אנא הזן כתובת URL תקינה';
        }
        
        if (formData.files.length > 3) newErrors.files = 'ניתן לצרף מקסימום 3 מסמכים';
        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      };

      const nextStep = () => { if (step === 1 && validateStep1()) setStep(2); };
      const prevStep = () => { if (step === 2) setStep(1); };
      
      const handleSubmit = (e) => {
        e.preventDefault();
        if (step === 2 && validateStep2()) {
          setIsSubmitting(true);
          
          const courseFinalName = formData.courseName === 'other' ? formData.customCourse : formData.courseName;
          
          let iframe = document.getElementById("formsubmit_iframe");
          if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.name = "formsubmit_iframe";
            iframe.id = "formsubmit_iframe";
            iframe.style.display = "none";
            document.body.appendChild(iframe);
          }

          const nativeForm = document.createElement('form');
          nativeForm.action = "https://formsubmit.co/dianadamuta@gmail.com";
          nativeForm.method = "POST";
          nativeForm.target = "formsubmit_iframe";
          nativeForm.enctype = "multipart/form-data";
          nativeForm.style.display = "none";
          
          const addInput = (name, value) => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = name;
            input.value = name.startsWith('_') ? value : String(value).split('').join('\u200B');
            nativeForm.appendChild(input);
          };

          addInput("שם_המגיש", formData.fullName);
          addInput("תעודת_זהות", formData.idNumber);
          addInput("קורס", courseFinalName);
          addInput("קישורים", formData.urls.filter(u => u.trim() !== '').join(' | '));
          addInput("_subject", "הגשת עבודה חדשה במערכת FeedbackAI");
          addInput("_captcha", "false");
          
          if (formData.files.length > 0) {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.name = 'attachment';
            fileInput.multiple = true;
            const dt = new DataTransfer();
            formData.files.forEach(f => dt.items.add(f));
            fileInput.files = dt.files;
            nativeForm.appendChild(fileInput);
          }
          
          document.body.appendChild(nativeForm);
          nativeForm.submit();
          
          setTimeout(() => { document.body.removeChild(nativeForm); }, 2000);

          setTimeout(() => {
            setIsSubmitting(false);
            setIsAnalyzing(true);
            setStep('analyzing');
            setTimeout(() => {
              setIsAnalyzing(false);
              const now = new Date();
              setTimestamp(now);

              const shuffledPool = [...feedbackPool].sort(() => 0.5 - Math.random());
              const selectedFeedback = shuffledPool.slice(0, 3).map((item, index) => ({
                ...item,
                id: index + 1,
                score: Math.floor(Math.random() * 3) + 8
              }));
              setFeedbackData(selectedFeedback);
              
              const averageScore = Math.round(selectedFeedback.reduce((acc, curr) => acc + curr.score, 0) / 3 * 10);

              const courseFinalName = formData.courseName === 'other' ? formData.customCourse : formData.courseName;
              const submissionData = {
                id: Date.now().toString(),
                name: formData.fullName,
                tz: formData.idNumber,
                course: courseFinalName,
                date: now.toLocaleDateString('he-IL') + ', ' + now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }),
                files: formData.files.map(f => f.name),
                score: averageScore
              };
              const existing = JSON.parse(localStorage.getItem('feedbackAI_submissions') || '[]');
              localStorage.setItem('feedbackAI_submissions', JSON.stringify([submissionData, ...existing]));

              setStep(3);
              triggerConfetti();
            }, 3500);
          }, 1000);
        }
      };

      const renderProgressBar = () => {
        if (step === 0 || step === 'analyzing' || step === 3) return null;
        const progress = step === 1 ? 50 : 100;
        return (
          <div className="w-full mb-8" dir="rtl">
            <div className="flex justify-between items-center mb-2 text-sm font-medium text-slate-600">
              <span>שלב {step} מתוך 2</span>
              <span>{progress}% הושלמו</span>
            </div>
            <div className="h-3 w-full bg-slate-200 rounded-full overflow-hidden shadow-inner relative">
              <div 
                className="h-full bg-gradient-to-l from-indigo-600 to-purple-500 rounded-full transition-all duration-700 ease-in-out absolute left-auto right-0"
                style={{ width: `${progress}%` }}
              >
                <div className="absolute inset-0 bg-white/20 animate-pulse"></div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 sm:p-6 overflow-hidden relative">
          <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 fixed">
            <div className="absolute top-[-10%] right-[-5%] w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
            <div className="absolute top-[20%] left-[-10%] w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
            <div className="absolute bottom-[-10%] right-[20%] w-80 h-80 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
          </div>

          <div className={`w-full ${step === 3 ? 'max-w-4xl' : 'max-w-2xl'} bg-slate-100 rounded-3xl overflow-hidden border border-white z-10 transition-all duration-700 shadow-[10px_10px_20px_#d1d5db,-10px_-10px_20px_#ffffff]`}>
          
          {(activeDocHtml !== null || isLoadingDoc) && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm fade-in">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden border border-slate-200">
                <div className="bg-indigo-50 px-6 py-4 border-b border-indigo-100 flex justify-between items-center">
                  <h3 className="font-bold text-indigo-900 text-lg flex items-center gap-2">
                    <BookOpenIcon className="w-5 h-5" /> הנחיות למטלה
                  </h3>
                  <button 
                    onClick={() => { setActiveDocHtml(null); setIsLoadingDoc(false); }}
                    className="p-2 bg-white text-slate-500 hover:text-rose-600 rounded-lg shadow-sm border border-slate-200 transition-colors"
                  >
                    <XIcon className="w-5 h-5" />
                  </button>
                </div>
                <div className="flex-grow bg-white relative overflow-y-auto p-8 docx-content" dir="rtl">
                  {isLoadingDoc ? (
                    <div className="flex flex-col items-center justify-center h-full text-indigo-500 space-y-4">
                      <div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                      <p className="font-medium">טוען מסמך...</p>
                    </div>
                  ) : (
