<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedbackAI - לוח בקרה למרצה</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>

  <style>
    body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; }
    .dir-ltr { direction: ltr; text-align: left; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased dir-rtl">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    /** @jsx React.createElement */
    /** @jsxFrag React.Fragment */
    
    const { useState, useEffect } = React;

    // Icons
    const DownloadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const EyeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
    const SearchIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;

    // Mock Data for the Lecturer Dashboard
    const MOCK_SUBMISSIONS = [
      { id: '1', name: 'ישראל ישראלי', tz: '012345678', course: 'ניהול סיכונים ובטיחות המטופל בגריאטריה', date: '15.06.2026, 10:30', files: ['project_v1.pdf'], score: 92 },
      { id: '2', name: 'מאיה כהן', tz: '304958671', course: 'מניעת זיהומים', date: '15.06.2026, 11:15', files: ['infection_control_case.pdf', 'references.docx'], score: 88 },
      { id: '3', name: 'דוד לוי', tz: '204938475', course: 'טיפול תומך', date: '14.06.2026, 16:45', files: ['palliative_care.pdf'], score: 95 },
      { id: '4', name: 'שירה אברהם', tz: '312456987', course: 'אתיקה מקצועית ומשפט רפואי', date: '13.06.2026, 09:20', files: ['ethics_final.pdf'], score: 85 }
    ];

    // Initial state for course settings
    const DEFAULT_COURSE_SETTINGS = {
      "ניהול סיכונים ובטיחות המטופל בגריאטריה": { date: "", link: "" },
      "מניעת זיהומים": { date: "", link: "" },
      "טיפול תומך": { date: "", link: "" }
    };

    const Dashboard = () => {
      const [searchTerm, setSearchTerm] = useState('');
      const [submissions, setSubmissions] = useState(MOCK_SUBMISSIONS);
      const [courseSettings, setCourseSettings] = useState(DEFAULT_COURSE_SETTINGS);
      const [activeTab, setActiveTab] = useState('submissions'); // 'submissions' or 'settings'

      React.useEffect(() => {
        // Load submissions
        const local = JSON.parse(localStorage.getItem('feedbackAI_submissions') || '[]');
        if (local.length > 0) {
          setSubmissions([...local, ...MOCK_SUBMISSIONS]);
        }
        
        // Load course settings
        const settings = JSON.parse(localStorage.getItem('feedbackAI_course_settings'));
        if (settings) {
          setCourseSettings(prev => ({ ...prev, ...settings }));
        }
      }, []);

      const saveCourseSettings = (newSettings) => {
        setCourseSettings(newSettings);
        localStorage.setItem('feedbackAI_course_settings', JSON.stringify(newSettings));
        alert('ההגדרות נשמרו בהצלחה! הסטודנטים יראו את העדכון במסך ההגשה.');
      };

      const handleSettingChange = (course, field, value) => {
        setCourseSettings(prev => ({
          ...prev,
          [course]: {
            ...prev[course],
            [field]: value
          }
        }));
      };

      const clearAllSubmissions = () => {
        if (window.confirm('האם את בטוחה שברצונך למחוק את כל ההגשות מהלוח? (פעולה זו לא תמחק אותן מהמייל שלך)')) {
          localStorage.removeItem('feedbackAI_submissions');
          setSubmissions([]);
        }
      };

      const filteredSubmissions = submissions.filter(sub => 
        sub.name.includes(searchTerm) || 
        sub.tz.includes(searchTerm) || 
        sub.course.includes(searchTerm)
      );

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="bg-indigo-900 text-white p-6 shadow-lg">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
                <div>
                  <h1 className="text-3xl font-bold tracking-tight">לוח בקרה למרצה (הדגמה)</h1>
                  <p className="text-indigo-200 mt-1">צפייה בריכוז ההגשות - FeedbackAI</p>
                </div>
                <div className="flex items-center gap-6">
                  <a href="index.html" className="bg-indigo-800 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-[4px_4px_10px_rgba(0,0,0,0.3),-4px_-4px_10px_rgba(255,255,255,0.1)] active:shadow-[inset_4px_4px_10px_rgba(0,0,0,0.3),inset_-4px_-4px_10px_rgba(255,255,255,0.1)] text-sm">
                    חזרה למסך ההגשה
                  </a>
                  <img src="https://static.wixstatic.com/media/6bc0af_7019d443c059443b9e25e6cf39f14dea~mv2.jpeg" alt="לוגו העמותה" className="h-40 object-contain bg-white rounded-2xl p-3 shadow-xl" />
                </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-7xl mx-auto p-6 mt-6">
            
            <div className="bg-blue-50 border-r-4 border-blue-500 p-4 rounded-lg mb-8 shadow-sm">
              <h3 className="font-bold text-blue-800 mb-1">שים לב: זוהי סביבת הדגמה (Mock)</h3>
              <p className="text-sm text-blue-700">
                כיוון שהמערכת פועלת כרגע רק בדפדפן (ללא שרת Backend שאותו סירבת להקים מוקדם יותר), אין לה מקום אמיתי לשמור בו קבצים. הנתונים שמוצגים למטה הם נתוני דמה (Mock Data) בלבד כדי להראות לך איך הלוח נראה ופועל. 
                כדי לראות כאן את עבודות הסטודנטים האמיתיים בעתיד, נדרש חיבור לשרת או למסד נתונים.
              </p>
            </div>

            {/* Tabs - 3D Neumorphism Style */}
            <div className="flex space-x-reverse space-x-4 mb-6">
              <button 
                onClick={() => setActiveTab('submissions')} 
                className={`py-3 px-6 font-bold text-lg rounded-xl transition-all duration-300 ${activeTab === 'submissions' ? 'bg-indigo-50 text-indigo-700 shadow-[inset_4px_4px_8px_#d1d5db,inset_-4px_-4px_8px_#ffffff]' : 'bg-slate-50 text-slate-500 shadow-[4px_4px_8px_#d1d5db,-4px_-4px_8px_#ffffff] hover:shadow-[2px_2px_4px_#d1d5db,-2px_-2px_4px_#ffffff]'}`}
              >
                הגשות סטודנטים
              </button>
              <button 
                onClick={() => setActiveTab('settings')} 
                className={`py-3 px-6 font-bold text-lg rounded-xl transition-all duration-300 ${activeTab === 'settings' ? 'bg-indigo-50 text-indigo-700 shadow-[inset_4px_4px_8px_#d1d5db,inset_-4px_-4px_8px_#ffffff]' : 'bg-slate-50 text-slate-500 shadow-[4px_4px_8px_#d1d5db,-4px_-4px_8px_#ffffff] hover:shadow-[2px_2px_4px_#d1d5db,-2px_-2px_4px_#ffffff]'}`}
              >
                ניהול קורסים (תאריכים והנחיות)
              </button>
            </div>

            {activeTab === 'settings' && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in p-6">
                <h2 className="text-xl font-bold text-slate-800 mb-6">הגדרת תאריכי הגשה והנחיות לקורסים</h2>
                <div className="space-y-8">
                  {Object.keys(DEFAULT_COURSE_SETTINGS).map((course, idx) => (
                    <div key={idx} className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                      <h3 className="font-bold text-lg text-indigo-800 mb-4">{course}</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">תאריך הגשה אחרון (Deadline)</label>
                          <input 
                            type="date" 
                            value={courseSettings[course]?.date || ''}
                            onChange={(e) => handleSettingChange(course, 'date', e.target.value)}
                            className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-[inset_2px_2px_5px_#d1d5db,inset_-2px_-2px_5px_#ffffff] bg-slate-50"
                          />
                        </div>
                        <div className="flex items-end pb-2">
                          <p className="text-sm text-slate-500 italic">הנחיות הקורס משולבות כעת אוטומטית מתוך קבצי ה-WORD שהעלית למערכת.</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-8 flex justify-end">
                  <button 
                    onClick={() => saveCourseSettings(courseSettings)}
                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-[4px_4px_10px_#d1d5db,-4px_-4px_10px_#ffffff] active:shadow-[inset_4px_4px_10px_rgba(0,0,0,0.2),inset_-4px_-4px_10px_rgba(255,255,255,0.1)]"
                  >
                    שמור תאריכי קורסים
                  </button>
                </div>
              </div>
            )}

            {activeTab === 'submissions' && (
              <>
                {/* Toolbar */}
                <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 fade-in">
                  <div className="flex items-center gap-4">
                    <h2 className="text-2xl font-bold text-slate-800">רשימת עבודות שהוגשו</h2>
                {submissions.length > 0 && (
                  <button 
                    onClick={clearAllSubmissions}
                    className="text-xs bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-lg border border-red-200 transition font-medium"
                  >
                    מחק הכל
                  </button>
                )}
              </div>
              
              <div className="relative w-full sm:w-80">
                <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                  <SearchIcon />
                </div>
                <input 
                  type="text" 
                  placeholder="חיפוש לפי שם, ת.ז או קורס..." 
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="block w-full pr-10 pl-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none shadow-sm"
                />
              </div>
            </div>

            {/* Table */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in">
              <div className="overflow-x-auto">
                <table className="w-full text-right text-sm text-slate-600">
                  <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                    <tr>
                      <th scope="col" className="px-6 py-4 font-semibold">שם המגיש</th>
                      <th scope="col" className="px-6 py-4 font-semibold">תעודת זהות</th>
                      <th scope="col" className="px-6 py-4 font-semibold">קורס</th>
                      <th scope="col" className="px-6 py-4 font-semibold">תאריך הגשה</th>
                      <th scope="col" className="px-6 py-4 font-semibold">ציון AI</th>
                      <th scope="col" className="px-6 py-4 font-semibold text-center">פעולות (קבצים)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredSubmissions.length > 0 ? (
                      filteredSubmissions.map((sub, index) => (
                        <tr key={sub.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors fade-in" style={{ animationDelay: `${index * 0.1}s` }}>
                          <td className="px-6 py-4 font-medium text-slate-900">{sub.name}</td>
                          <td className="px-6 py-4">{sub.tz}</td>
                          <td className="px-6 py-4 text-indigo-700 font-medium">{sub.course}</td>
                          <td className="px-6 py-4 dir-ltr text-right">{sub.date}</td>
                          <td className="px-6 py-4">
                            <span className="bg-green-100 text-green-800 px-2.5 py-1 rounded-full font-bold text-xs border border-green-200">
                              {sub.score}/100
                            </span>
                          </td>
                          <td className="px-6 py-4">
                            <div className="flex items-center justify-center gap-2">
                              <button className="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 rounded-lg transition text-xs font-medium border border-indigo-200" title="הצג עבודה">
                                <EyeIcon /> הצג
                              </button>
                              <button className="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 rounded-lg transition text-xs font-medium" title="הורד כ-PDF">
                                <DownloadIcon /> הורד PDF
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))
                    ) : (
                      <tr>
                        <td colSpan="6" className="px-6 py-12 text-center text-slate-500">
                          לא נמצאו הגשות תואמות לחיפוש שלך.
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
              </>
            )}

          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
